<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – Sistema EPI</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #080c14;
    --surface: #0f1623;
    --border: #1e2d45;
    --accent: #0ea5e9;
    --accent2: #6366f1;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 12px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Background animado */
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(14,165,233,.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: float 8s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,.1) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: float 10s ease-in-out infinite reverse;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 25px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
  }
  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(14,165,233,.3);
  }
  .logo h1 { color: var(--text); font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .form-group { margin-bottom: 18px; }
  label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:7px; }
  input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,.15); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: .3px;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 4px 20px rgba(14,165,233,.35);
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }

  .erro {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fca5a5;
    font-size: 13px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .hint { text-align:center; color:var(--muted); font-size:12px; }
  .hint span { color:var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🦺</div>
    <h1>Sistema EPI</h1>
    <p>Fiscalização Automatizada de EPIs</p>
  </div>

  {% if erro %}
  <div class="erro">⚠ {{ erro }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required autofocus>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Entrar no Sistema</button>
  </form>

  <hr class="divider">
  <p class="hint">Acesso restrito · <span>NR-6 / MTE</span></p>
</div>
</body>
</html>
